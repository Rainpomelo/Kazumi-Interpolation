name: "release"

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  flutter-build-android:
    name: "Release for android (Vulkan Frame Interpolation)"
    runs-on: "ubuntu-latest" 
    permissions: write-all
    steps:
      - name: Clone repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake libgtk-3-dev ninja-build libayatana-appindicator3-dev libasound2-dev
        shell: bash

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'          

      - name: Set up Flutter (Stable Channel)
        uses: subosito/flutter-action@v2
        id: flutter-action
        with:
          channel: 'stable'

      - name: Get Flutter dependencies
        run: flutter pub get
        shell: bash

      - name: Patch JNI build-id
        run: sed -i -e 's/-Wl,/-Wl,--build-id=none,/' ${{ steps.flutter-action.outputs.PUB-CACHE-PATH }}/hosted/pub.dev/jni-*/src/CMakeLists.txt || true
        shell: bash

      - name: Build Flutter for Android
        run: flutter build apk --debug --no-tree-shake-icons
        shell: bash

      - name: Upload android outputs
        uses: actions/upload-artifact@v4
        with:
          name: Kazumi-Vulkan-Interpolation-APK
          path: build/app/outputs/flutter-apk/*.apk
